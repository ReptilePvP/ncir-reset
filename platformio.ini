; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-cores3]
platform = espressif32@6.13.0
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps = 
	https://github.com/m5stack/M5GFX.git#5268353cffabd2925b87ed9bcc05ded4e22cc3d1
    https://github.com/m5stack/M5Unified.git#46aa9ede24016a70f397884e8fb3c0ccc3a05269
    adafruit/Adafruit BusIO@^1.14.5
	lvgl/lvgl@9.3.0
	adafruit/Adafruit MLX90614 Library@^2.1.5

build_unflags =
	-std=gnu++11
    
build_flags = 
	-std=gnu++17
	-DBOARD_HAS_PSRAM
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-D LV_CONF_INCLUDE_SIMPLE
	-DLCD_HEIGHT=240
	-DLCD_WIDTH=320
	-DLV_TICK_PERIOD_MS=10
	-DM5CORES3
	-I./include
	-I.pio/libdeps/m5stack-cores3
	-include include/lvgl_m5gfx_compat.h
